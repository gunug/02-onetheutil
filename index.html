<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneThe Util</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon-util.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/ds.css">
    <style>
        .link-list{list-style:none;padding:0;display:grid;gap:var(--s4);}
        .link-list .card{display:flex;justify-content:space-between;align-items:center;gap:var(--s4);}
        .link-list h3{margin:0;}
        .link-list .desc{color:var(--muted);font-size:13px;margin-top:4px;}
        .link-list .txt{min-width:0;}
        .hero{margin-bottom:var(--s7);}
        .hero h1{font-size:44px;line-height:1.05;}
        .hero p{color:var(--muted);font-size:18px;margin-top:var(--s3);}

        /* iframe 모달 */
        .modal{position:fixed;inset:0;z-index:1000;display:none;
            background:rgba(0,0,0,.6);backdrop-filter:blur(2px);}
        .modal.open{display:flex;flex-direction:column;padding:var(--s5);}
        .modal-bar{display:flex;align-items:center;gap:var(--s4);
            padding:0 0 var(--s3);}
        .modal-bar .m-title{font-weight:700;font-size:16px;color:#fff;
            margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .modal-frame{flex:1;width:100%;border:1px solid var(--hairline);
            border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--sh-lg);}
    </style>
</head>
<body>
    <main class="container">
        <header class="hero">
            <span class="eyebrow">OneThe Util</span>
            <h1>유틸리티 모음</h1>
            <p>자주 쓰는 문서·도구 모음.</p>
        </header>

        <ul class="link-list">
            <li>
                <div class="card">
                    <div class="txt">
                        <h3>표준 도급계약서</h3>
                        <p class="desc">소프트웨어종사자(용역) 표준 도급계약서 작성·인쇄</p>
                    </div>
                    <a href="contect/contect.html" class="btn btn-primary">열기</a>
                </div>
            </li>
            <li>
                <div class="card">
                    <div class="txt">
                        <h3>디자인 시스템</h3>
                        <p class="desc">OneTheLab 디자인 토큰·컴포넌트 레퍼런스</p>
                    </div>
                    <a href="design-system/design_system.html" class="btn btn-primary">열기</a>
                </div>
            </li>
            <li>
                <div class="card">
                    <div class="txt">
                        <h3>아이콘 빌더</h3>
                        <p class="desc">SVG 아이콘 조합·생성 (Supabase)</p>
                    </div>
                    <a href="icon-builder/icon_builder.html" class="btn btn-primary">열기</a>
                </div>
            </li>
            <li>
                <div class="card">
                    <div class="txt">
                        <h3>SVG 갤러리</h3>
                        <p class="desc">업로드된 아이콘 열람·관리</p>
                    </div>
                    <a href="svg-gallery/svg_gallery.html" class="btn btn-primary">열기</a>
                </div>
            </li>
            <li>
                <div class="card">
                    <div class="txt">
                        <h3>SVG 그리드 빌더</h3>
                        <p class="desc">10×10 그리드 아이콘 합성·내보내기</p>
                    </div>
                    <a href="svg-grid-builder/svg_grid_builder.html" class="btn btn-primary">열기</a>
                </div>
            </li>
        </ul>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
        <div class="modal-bar">
            <span class="m-title" id="mTitle"></span>
            <a class="btn btn-secondary btn-sm" id="mNewTab" href="#" target="_blank" rel="noopener">새 탭</a>
            <button class="btn btn-primary btn-sm" id="mClose" type="button">닫기 ✕</button>
        </div>
        <iframe class="modal-frame" id="mFrame" title="미리보기"></iframe>
    </div>

    <script>
        (function () {
            const modal = document.getElementById("modal");
            const frame = document.getElementById("mFrame");
            const title = document.getElementById("mTitle");
            const newTab = document.getElementById("mNewTab");

            function open(href, name) {
                frame.src = href;
                title.textContent = name;
                newTab.href = href;
                modal.classList.add("open");
                modal.setAttribute("aria-hidden", "false");
                document.body.style.overflow = "hidden";
            }
            function close() {
                modal.classList.remove("open");
                modal.setAttribute("aria-hidden", "true");
                frame.src = "about:blank";
                document.body.style.overflow = "";
            }

            document.querySelectorAll(".link-list a").forEach(a => {
                a.addEventListener("click", e => {
                    e.preventDefault();
                    const name = a.closest(".card").querySelector("h3").textContent;
                    open(a.getAttribute("href"), name);
                });
            });
            document.getElementById("mClose").addEventListener("click", close);
            modal.addEventListener("click", e => { if (e.target === modal) close(); });
            document.addEventListener("keydown", e => {
                if (e.key === "Escape" && modal.classList.contains("open")) close();
            });
        })();
    </script>
</body>
</html>
