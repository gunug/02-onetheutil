<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon-ocr.svg">
<title>OCR — 이미지 텍스트 추출</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Tesseract.js (브라우저 OCR, 서버 불필요) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root {
    --brand-yellow:#FFD400; --brand-yellow-soft:#FFE766; --brand-yellow-deep:#C9A600; --on-brand:#1A1A17;
    --ink:#F5F4EC; --body:#CFCDC2; --muted:#8E8C82; --hairline:#33332B;
    --canvas:#121210; --surface:#1C1C17; --surface-soft:#26261F;
    --sh-sm:0 1px 2px rgba(0,0,0,.4); --sh-md:0 4px 16px rgba(0,0,0,.45);
    --r-sm:6px; --r-md:10px; --r-lg:16px;
    --font:"Inter",-apple-system,"Segoe UI",sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 40px 24px 64px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    font-family: var(--font); background: var(--canvas); color: var(--body);
    -webkit-font-smoothing: antialiased;
  }
  .eyebrow { display:inline-block; background:#161613; color:var(--brand-yellow); font-size:11px; font-weight:600;
             letter-spacing:.12em; text-transform:uppercase; padding:5px 12px; border-radius:9999px; margin-bottom:8px; }
  .head { text-align:center; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing:-.02em; color: var(--ink); margin: 0; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .wrap { width:100%; max-width:900px; display:flex; flex-direction:column; gap:16px; }

  /* 컨트롤 바 */
  .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .field { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); }
  select {
    background:var(--surface-soft); border:1px solid var(--hairline); border-radius:var(--r-md);
    color:var(--ink); font-family:var(--font); font-size:13px; padding:8px 12px; cursor:pointer;
  }
  select:focus { outline:none; border-color:var(--brand-yellow); }

  .btn {
    font-family:var(--font); font-size:13px; font-weight:700; padding:9px 18px; border-radius:var(--r-md);
    border:1px solid var(--hairline); background:var(--surface); color:var(--body); cursor:pointer; transition:.12s;
  }
  .btn:hover:not(:disabled) { color:var(--ink); border-color:var(--brand-yellow); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }
  .btn-primary { background:var(--brand-yellow); color:var(--on-brand); border-color:var(--brand-yellow); }
  .btn-primary:hover:not(:disabled) { background:var(--brand-yellow-soft); color:var(--on-brand); }

  /* 드롭존 */
  .drop {
    border:2px dashed var(--hairline); border-radius:var(--r-lg); background:var(--surface);
    padding:36px 24px; text-align:center; cursor:pointer; transition:.15s; color:var(--muted);
  }
  .drop:hover { border-color:var(--brand-yellow-deep); color:var(--body); }
  .drop.over { border-color:var(--brand-yellow); background:var(--surface-soft); color:var(--ink); }
  .drop strong { color:var(--ink); font-weight:700; }
  .drop .hint { font-size:12px; margin-top:8px; }
  .drop kbd { font-family:var(--mono); font-size:11px; background:var(--surface-soft); border:1px solid var(--hairline);
              border-radius:4px; padding:1px 6px; color:var(--body); }

  /* 미리보기 */
  .preview { display:none; }
  .preview.show { display:block; }
  .preview img { max-width:100%; max-height:360px; border-radius:var(--r-md); border:1px solid var(--hairline);
                 display:block; margin:0 auto; box-shadow:var(--sh-sm); }
  .preview .meta { text-align:center; font-size:11px; color:var(--muted); margin-top:8px; font-family:var(--mono); }

  /* 진행 상태 */
  .progress { display:none; }
  .progress.show { display:block; }
  .bar { height:6px; background:var(--surface-soft); border-radius:9999px; overflow:hidden; }
  .bar > i { display:block; height:100%; width:0; background:var(--brand-yellow); transition:width .2s; }
  .status { font-size:12px; color:var(--muted); margin-top:8px; font-family:var(--mono); text-align:center; }

  /* 결과 */
  .result { display:none; flex-direction:column; gap:10px; }
  .result.show { display:flex; }
  .result-head { display:flex; align-items:center; gap:10px; }
  .result-head .label { font-size:13px; font-weight:700; color:var(--ink); margin-right:auto; }
  .result-head .count { font-size:11px; color:var(--muted); font-family:var(--mono); }
  textarea {
    width:100%; min-height:220px; resize:vertical; background:var(--surface); border:1px solid var(--hairline);
    border-radius:var(--r-md); color:var(--ink); font-family:var(--mono); font-size:14px; line-height:1.6;
    padding:14px 16px;
  }
  textarea:focus { outline:none; border-color:var(--brand-yellow); }

  .toast {
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:var(--brand-yellow); color:var(--on-brand); font-size:13px; font-weight:700;
    padding:10px 20px; border-radius:9999px; box-shadow:var(--sh-md); opacity:0; pointer-events:none; transition:.2s;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="head">
    <span class="eyebrow">OCR</span>
    <h1>이미지 텍스트 추출</h1>
    <p class="sub">Tesseract.js · 브라우저에서 처리 (이미지 서버 전송 없음)</p>
  </div>

  <div class="wrap">
    <div class="controls">
      <label class="field">
        언어
        <select id="lang">
          <option value="kor+eng">한국어 + 영어</option>
          <option value="kor">한국어</option>
          <option value="eng">영어</option>
          <option value="jpn+eng">일본어 + 영어</option>
        </select>
      </label>
      <button id="run" class="btn btn-primary" disabled>텍스트 추출</button>
      <button id="clear" class="btn" disabled>초기화</button>
    </div>

    <div id="drop" class="drop" tabindex="0">
      <div><strong>이미지를 여기에 놓기</strong> · 클릭하여 선택</div>
      <div class="hint"><kbd>Ctrl</kbd> + <kbd>V</kbd> 로 붙여넣기도 가능</div>
      <input id="file" type="file" accept="image/*" hidden>
    </div>

    <div id="preview" class="preview">
      <img id="pimg" alt="미리보기">
      <div class="meta" id="pmeta"></div>
    </div>

    <div id="progress" class="progress">
      <div class="bar"><i id="barfill"></i></div>
      <div class="status" id="status">준비 중…</div>
    </div>

    <div id="result" class="result">
      <div class="result-head">
        <span class="label">추출 결과</span>
        <span class="count" id="count">0자</span>
        <button id="copy" class="btn">복사</button>
      </div>
      <textarea id="out" placeholder="추출된 텍스트가 여기에 표시됩니다." spellcheck="false"></textarea>
    </div>
  </div>

  <div id="toast" class="toast">복사됨</div>

<script>
  const $ = id => document.getElementById(id);
  const drop = $("drop"), fileInput = $("file"), runBtn = $("run"), clearBtn = $("clear");
  const preview = $("preview"), pimg = $("pimg"), pmeta = $("pmeta");
  const progress = $("progress"), barfill = $("barfill"), statusEl = $("status");
  const result = $("result"), out = $("out"), countEl = $("count"), copyBtn = $("copy");
  const langSel = $("lang"), toast = $("toast");

  let currentURL = null;   // objectURL for cleanup
  let currentSrc = null;   // Tesseract 입력 (objectURL 문자열)
  let busy = false;

  function showToast(msg) {
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(showToast._t); showToast._t = setTimeout(() => toast.classList.remove("show"), 1400);
  }

  function setImage(blob) {
    if (currentURL) URL.revokeObjectURL(currentURL);
    currentURL = URL.createObjectURL(blob);
    currentSrc = currentURL;
    pimg.src = currentURL;
    pimg.onload = () => {
      const kb = (blob.size / 1024).toFixed(0);
      pmeta.textContent = `${pimg.naturalWidth} × ${pimg.naturalHeight} px · ${kb} KB · ${blob.type || "image"}`;
    };
    preview.classList.add("show");
    runBtn.disabled = false; clearBtn.disabled = false;
    result.classList.remove("show"); progress.classList.remove("show");
  }

  function acceptFile(f) {
    if (!f || !f.type.startsWith("image/")) { showToast("이미지 파일만 가능"); return; }
    setImage(f);
  }

  // 1) 클릭 → 파일 선택
  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); } });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) acceptFile(fileInput.files[0]); fileInput.value = ""; });

  // 2) 드래그 드롭
  ["dragenter", "dragover"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
  ["dragleave", "drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
  drop.addEventListener("drop", e => {
    const f = e.dataTransfer.files[0];
    if (f) acceptFile(f);
  });

  // 3) 붙여넣기
  window.addEventListener("paste", e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const it of items) {
      if (it.type.startsWith("image/")) { acceptFile(it.getAsFile()); e.preventDefault(); return; }
    }
  });

  // OCR 실행
  runBtn.addEventListener("click", async () => {
    if (!currentSrc || busy) return;
    busy = true;
    runBtn.disabled = true; clearBtn.disabled = true;
    result.classList.remove("show");
    progress.classList.add("show");
    barfill.style.width = "0%"; statusEl.textContent = "엔진 로드 중…";

    try {
      const { data } = await Tesseract.recognize(currentSrc, langSel.value, {
        logger: m => {
          if (m.status === "recognizing text") {
            barfill.style.width = Math.round(m.progress * 100) + "%";
            statusEl.textContent = `인식 중… ${Math.round(m.progress * 100)}%`;
          } else {
            statusEl.textContent = m.status + (m.progress ? ` ${Math.round(m.progress * 100)}%` : "");
          }
        }
      });
      const text = (data.text || "").trim();
      out.value = text;
      updateCount();
      result.classList.add("show");
      statusEl.textContent = "완료";
      barfill.style.width = "100%";
    } catch (err) {
      statusEl.textContent = "실패: " + (err && err.message ? err.message : err);
    } finally {
      busy = false;
      runBtn.disabled = false; clearBtn.disabled = false;
    }
  });

  // 초기화
  clearBtn.addEventListener("click", () => {
    if (currentURL) URL.revokeObjectURL(currentURL);
    currentURL = currentSrc = null;
    preview.classList.remove("show"); result.classList.remove("show"); progress.classList.remove("show");
    out.value = ""; updateCount();
    runBtn.disabled = true; clearBtn.disabled = true;
  });

  // 복사 & 글자수
  function updateCount() { countEl.textContent = out.value.length + "자"; }
  out.addEventListener("input", updateCount);
  copyBtn.addEventListener("click", async () => {
    if (!out.value) return;
    try { await navigator.clipboard.writeText(out.value); showToast("복사됨"); }
    catch { out.select(); document.execCommand("copy"); showToast("복사됨"); }
  });
</script>
</body>
</html>
