<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon-svg-grid-builder.svg">
<title>svg grid builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Supabase (generated 목록 조회 + grid 저장/불러오기/업로드) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    : null;
</script>
<style>
  :root {
    --brand-yellow:#FFD400; --brand-yellow-soft:#FFE766; --brand-yellow-deep:#C9A600; --on-brand:#1A1A17;
    --ink:#F5F4EC; --body:#CFCDC2; --muted:#8E8C82; --hairline:#33332B;
    --canvas:#121210; --surface:#1C1C17; --surface-soft:#26261F;
    --sh-sm:0 1px 2px rgba(0,0,0,.4); --sh-md:0 4px 16px rgba(0,0,0,.45);
    --r-sm:6px; --r-md:10px; --r-lg:16px;
    --font:"Inter",-apple-system,"Segoe UI",sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  * { box-sizing: border-box; }
  /* [hidden] 이 .plist 같은 display:grid 규칙한테 명시도(specificity) 동률로 밀려서 안 먹히던 버그 →
     title 모달 열었는데 connector 썸네일 그리드가 같이 보이던 원인. 항상 이기게 강제. */
  [hidden] { display: none !important; }
  body {
    margin: 0; min-height: 100vh; padding: 40px 24px 64px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    font-family: var(--font); background: var(--canvas); color: var(--body);
    -webkit-font-smoothing: antialiased;
  }
  .eyebrow { display:inline-block; background:#161613; color:var(--brand-yellow); font-size:11px; font-weight:600;
             letter-spacing:.12em; text-transform:uppercase; padding:5px 12px; border-radius:9999px; margin-bottom:8px; }
  .head { text-align:center; }
  h1 { font-size: 28px; font-weight: 800; letter-spacing:-.02em; color: var(--ink); margin: 0; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .banner { display:none; width:100%; max-width:640px; background:#2a1a14; border:1px solid #6b3a2a;
            border-radius: var(--r-lg); padding:14px 18px; color:#ffd0c0; font-size:13px; line-height:1.5; }
  .banner.show { display:block; }
  .banner code { font-family: var(--mono); background:#3a221a; padding:1px 6px; border-radius:4px; color:#ffe; }

  /* 툴바 */
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; width:100%; max-width:640px; }
  .name-input { flex:1; min-width:140px; background:var(--surface-soft); border:1px solid var(--hairline);
            border-radius:var(--r-md); color:var(--ink); font-family:var(--font); font-size:14px; padding:9px 14px; }
  .name-input:focus { outline:none; border-color:var(--brand-yellow); }
  .name-input[readonly] { color:var(--muted); cursor:default; }
  .name-input[readonly]:focus { border-color:var(--hairline); }
  .btn { font-family:var(--font); font-size:12px; font-weight:700; padding:9px 14px; border:1px solid var(--hairline);
         border-radius:var(--r-md); background:var(--surface); color:var(--body); cursor:pointer; transition:.12s; white-space:nowrap; }
  .btn:hover { border-color:var(--brand-yellow); color:var(--ink); }
  .btn:disabled { opacity:.45; cursor:default; }
  .btn:disabled:hover { border-color:var(--hairline); color:var(--body); }
  .btn.primary { background:var(--brand-yellow); color:var(--on-brand); border-color:var(--brand-yellow); }
  .btn.primary:hover { background:var(--brand-yellow-deep); color:#fff; }
  .auth-row { display:flex; align-items:center; gap:8px; width:100%; max-width:640px; justify-content:flex-end; }

  /* 텍스트 스타일 전역 설정 패널 (제목/목록 색·크기 — 모든 칸 공통, localStorage) */
  .style-row { display:flex; align-items:center; gap:10px; }
  .style-label { width:74px; font-size:11px; font-weight:700; color:var(--body); }
  .style-row input[type="color"] { width:32px; height:32px; padding:0; border:1px solid var(--hairline); border-radius:var(--r-sm); background:var(--surface-soft); cursor:pointer; }
  .style-row input[type="range"] { flex:1; accent-color:var(--brand-yellow); }
  .style-row .val { font-family:var(--mono); font-size:12px; color:var(--muted); min-width:30px; text-align:right; }
  .auth-status { font-size:11px; font-family:var(--mono); color:var(--muted); max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* 10x10 격자 */
  /* grid-template-rows 명시 + min-width/height:0 → 칸 안 svg 고유크기 때문에 트랙이 늘어나는 그리드 blowout 방지 */
  /* gap:0 — export 는 칸끼리 완전히 붙여서 그림. 갭 있으면 미리보기에서 connector 가 옆칸까지 이어져
     보이지 않아 export 결과랑 달라짐. 경계는 .gcell 의 dashed border 로만 표시(칸끼리 맞닿아 겹침) */
  .gridwrap { display:grid; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(10,1fr);
              gap:0; width:100%; max-width:840px; aspect-ratio:1; }
  .gcell { position:relative; min-width:0; min-height:0; border:1.5px dashed var(--hairline); border-radius:6px; background:var(--surface);
           display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.12s; overflow:hidden; }
  .gcell:hover { border-color:var(--brand-yellow); }
  .gcell.filled { border-style:solid; background:var(--surface-soft); cursor:grab; }
  .gcell.dragging { opacity:.35; }
  .gcell.dragover { border-color:var(--brand-yellow); background:rgba(255,212,0,.15); }
  /* connector(하위)/icon(상위)/목록/제목 4개 다 자유 조합(배타적 아님) — connector→icon→목록→제목 순으로 겹쳐 그림 */
  .cell-content { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  /* 호버시만 보이는 4버튼(connector/icon/title/textfield) — 마우스 아웃하면 숨김. 클릭시 그 종류 전용 모달만 엶 */
  .cell-btns { position:absolute; inset:0; display:none; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; z-index:5; }
  .gcell:hover .cell-btns { display:grid; }
  /* min-width/height:0 없으면 버튼 글자(connector/textfield 등 긴 단어) 때문에 그리드 트랙이 늘어나
     2x2 배치가 깨져 버튼 일부가 안 보이던 버그 — 아이콘 svg 때 겪은 것과 같은 grid blowout */
  .cbtn { min-width:0; min-height:0; overflow:hidden; border:none; background:rgba(18,18,16,.78); color:var(--ink);
          font-family:var(--font); font-size:8px; font-weight:700; letter-spacing:.01em; cursor:pointer;
          white-space:nowrap; text-overflow:ellipsis;
          display:flex; align-items:center; justify-content:center; padding:0 2px; transition:.1s; }
  .cbtn:hover { background:var(--brand-yellow); color:var(--on-brand); }
  /* inset:0 — export 는 connector/icon 을 칸 전체(0~24, 자체 viewBox 여백만 있음)에 그림.
     여기 여백 더 주면 export 랑 크기·위치가 어긋남(예전 3px 는 그 자체가 mismatch 원인이었음) */
  .gcell .layer { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
  .gcell svg { width:100%; height:100%; max-width:100%; max-height:100%; display:block; pointer-events:none; }
  .gcell .plus { color:var(--hairline); font-size:16px; pointer-events:none; }
  .gcell:hover .plus { color:var(--muted); }
  .gcell .layer-title { align-items:flex-end; justify-content:center; padding-bottom:1px; z-index:2; }
  /* font-size 는 JS(renderCell)가 export 랑 같은 fitFontSize() 계산 거쳐 인라인으로 매번 세팅함 —
     여기 값은 JS 적용 전 잠깐 보이는 폴백일 뿐. padding/radius 는 em 이라 그 font-size 따라 같이 스케일됨
     (export 의 padX = fit.size*0.22, rx = fit.size*0.15 비율과 맞춤) */
  .cell-title-text { font-size:6.5px; font-family:var(--font); font-weight:700; line-height:1; max-width:100%;
                      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; background:rgba(18,18,16,.55);
                      padding:0 0.22em; border-radius:0.15em; }
  .layer-list { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
                gap:1px; overflow:hidden; text-align:center; pointer-events:none; z-index:1; }
  .cell-list-line { font-size:5.5px; font-family:var(--font); line-height:1.15; max-width:100%;
                     overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* 모달 공용 */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:100; padding:24px; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg); padding:20px;
           width:min(760px,100%); max-height:82vh; display:flex; flex-direction:column; gap:12px; box-shadow:var(--sh-md); }
  .modal h3 { margin:0; color:var(--ink); font-size:15px; }
  .modal-head { display:flex; align-items:center; gap:10px; }
  .modal-head .search { flex:1; background:var(--surface-soft); border:1px solid var(--hairline); border-radius:var(--r-md);
                         color:var(--ink); font-family:var(--font); font-size:13px; padding:8px 12px; }
  .modal-head .search:focus { outline:none; border-color:var(--brand-yellow); }
  .modal .close { cursor:pointer; background:none; border:none; color:var(--muted); font-size:20px; line-height:1; padding:2px 6px; }
  .modal .close:hover { color:var(--ink); }
  .modal-toolrow { display:flex; gap:8px; }
  .modal-toolrow .search { flex:1; }

  .plist { overflow:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); gap:8px; }
  .pitem { background:var(--surface-soft); border:1px solid var(--hairline); border-radius:8px; padding:6px; cursor:pointer;
           display:flex; flex-direction:column; align-items:center; gap:4px; transition:.12s; }
  .pitem:hover { border-color:var(--brand-yellow); }
  .pitem svg { width:48px; height:48px; }
  .pitem .nm { font-size:9px; font-family:var(--mono); color:var(--muted); text-align:center; word-break:break-all; line-height:1.3; }

  .picker-text input, .picker-text textarea { width:100%; background:var(--surface-soft); border:1px solid var(--hairline);
             border-radius:var(--r-md); color:var(--ink); font-family:var(--font); padding:9px 14px; }
  .picker-text textarea { min-height:140px; resize:vertical; line-height:1.4; }
  .picker-text input:focus, .picker-text textarea:focus { outline:none; border-color:var(--brand-yellow); }
  .modal-foot { display:flex; justify-content:flex-end; }

  /* 불러오기 모달 — SVG Gallery 카드 형식 그대로 (썸네일+이름+버튼) */
  .load-grid { overflow:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
  .load-card { background:var(--surface-soft); border:1px solid var(--hairline); border-radius:var(--r-md);
               padding:10px; display:flex; flex-direction:column; align-items:center; gap:8px; transition:.12s; }
  .load-card:hover { border-color:var(--brand-yellow); }
  .load-thumb { width:100%; height:96px; display:flex; align-items:center; justify-content:center;
                border-radius:var(--r-sm); background-color:#26261f; overflow:hidden;
                background-image:
                  linear-gradient(45deg, #1c1c17 25%, transparent 25%),
                  linear-gradient(-45deg, #1c1c17 25%, transparent 25%),
                  linear-gradient(45deg, transparent 75%, #1c1c17 75%),
                  linear-gradient(-45deg, transparent 75%, #1c1c17 75%);
                background-size:14px 14px; background-position:0 0,0 7px,7px -7px,-7px 0; }
  .load-thumb img { max-width:100%; max-height:100%; object-fit:contain; }
  .load-nm { font-size:10.5px; font-family:var(--mono); color:var(--muted); text-align:center; word-break:break-all; line-height:1.3; width:100%; }
  .load-btns { display:flex; gap:6px; width:100%; }
  .load-btns .btn { flex:1; font-size:11px; font-weight:600; padding:6px 0; }
  .load-btns .btn.del { display:none; background:#3a1a1a; border-color:#6b3a2a; color:#ffc9bd; }
  .load-btns .btn.del:hover { border-color:#ff8a6a; color:#fff; }
  body.edit-on .load-btns .btn.del { display:inline-block; }
  .empty-msg { color:var(--muted); font-size:12.5px; padding:12px 4px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
           background:var(--ink); color:var(--on-brand); font-size:13px; font-weight:600; padding:10px 18px;
           border-radius:9999px; box-shadow:var(--sh-md); opacity:0; pointer-events:none; transition:.18s; z-index:200; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="head">
    <span class="eyebrow">SVG Grid Builder</span>
    <h1>SVG Grid Builder</h1>
    <div class="sub">각 칸 = <b>connector</b>(하위)+<b>icon</b>(상위)+<b>title</b>+<b>textfield</b> 자유 조합(0~4개, 원하는 대로). 칸에 마우스 올리면 4버튼 나옴. 10×10 칸에 배치해 저장·불러오기·export.</div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="toolbar">
    <input type="text" class="name-input" id="grid-name" readonly
           placeholder="저장하면 칸 내용으로 이름 자동생성됨" title="자동생성됨 — 직접 입력 안 함">
    <button class="btn" id="btn-new" type="button">새로 만들기</button>
    <button class="btn primary" id="btn-save" type="button" title="grid 정의 저장 + SVG Gallery 썸네일도 같이 갱신됨">☁ 저장 (갤러리 동기화)</button>
    <button class="btn" id="btn-save-as" type="button" title="현재 이름과 상관없이 새 파일로 따로 저장">새 파일로 저장</button>
    <button class="btn" id="btn-load" type="button">불러오기</button>
    <button class="btn" id="btn-download" type="button">svg 다운로드</button>
    <!-- 그리드 전체 이동. 바깥쪽 svg 가 경계에 닿으면 해당 방향 비활성 -->
    <button class="btn" id="arrow-up" type="button" title="전체 위로 이동">▲</button>
    <button class="btn" id="arrow-down" type="button" title="전체 아래로 이동">▼</button>
    <button class="btn" id="arrow-left" type="button" title="전체 왼쪽으로 이동">◀</button>
    <button class="btn" id="arrow-right" type="button" title="전체 오른쪽으로 이동">▶</button>
    <button class="btn" id="btn-textstyle" type="button">스타일</button>
  </div>
  <div class="auth-row">
    <span class="auth-status" id="auth-status">로그인 확인 중…</span>
    <button class="btn" id="auth-btn" type="button">로그인</button>
  </div>

  <div class="gridwrap" id="gridwrap"></div>

  <!-- 텍스트 스타일 전역 설정 패널: 제목/목록 색·크기 각각 독립, localStorage 유지. 칸별 내용과는 무관(스타일만 공통) -->
  <div class="modal-bg" id="textstyle-bg">
    <div class="modal" style="width:min(420px,100%)">
      <div class="modal-head">
        <h3>스타일 (모든 칸 공통)</h3>
        <button class="close" id="textstyle-close" type="button">&times;</button>
      </div>
      <div class="style-row">
        <span class="style-label">connector</span>
        <input type="color" id="style-connector-color">
      </div>
      <div class="style-row">
        <span class="style-label">title</span>
        <input type="color" id="style-title-color">
        <input type="range" id="style-title-size" min="4" max="14" step="1">
        <span class="val" id="style-title-size-v"></span>
      </div>
      <div class="style-row">
        <span class="style-label">title bg</span>
        <input type="color" id="style-title-bg-color">
        <input type="range" id="style-title-bg-opacity" min="0" max="1" step="0.05">
        <span class="val" id="style-title-bg-opacity-v"></span>
      </div>
      <div class="style-row">
        <span class="style-label">textfield</span>
        <input type="color" id="style-legend-color">
        <input type="range" id="style-legend-size" min="3" max="10" step="1">
        <span class="val" id="style-legend-size-v"></span>
      </div>
      <div class="style-row">
        <span class="style-label">textfield bg</span>
        <input type="color" id="style-legend-bg-color">
        <input type="range" id="style-legend-bg-opacity" min="0" max="1" step="0.05">
        <span class="val" id="style-legend-bg-opacity-v"></span>
      </div>
    </div>
  </div>

  <!-- 칸 위 4개 호버 버튼(connector/icon/title/textfield) 중 하나를 누르면 그 종류 전용으로 이 모달이 열림.
       탭 이동 없음 — 버튼 선택 자체가 종류 선택. -->
  <div class="modal-bg" id="picker-bg">
    <div class="modal">
      <div class="modal-head">
        <h3 id="picker-title">칸에 넣을 svg 선택</h3>
        <button class="close" id="picker-close" type="button">&times;</button>
      </div>
      <div class="modal-toolrow">
        <input type="search" class="search" id="picker-search" placeholder="이름 검색">
        <button class="btn" id="picker-clear" type="button">비우기</button>
      </div>
      <div class="plist" id="picker-list"></div>
      <div class="picker-text" id="picker-text-title" hidden>
        <input type="text" id="picker-title-input" placeholder="이 칸 title">
      </div>
      <div class="picker-text" id="picker-text-list" hidden>
        <textarea id="picker-legend-textarea" rows="7" placeholder="이 칸 textfield 내용 (한 줄에 하나씩)"></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn primary" id="picker-done" type="button">완료</button>
      </div>
    </div>
  </div>

  <!-- 불러오기 모달: SVG Gallery 카드 형식 -->
  <div class="modal-bg" id="load-bg">
    <div class="modal" style="width:min(720px,100%)">
      <div class="modal-head">
        <h3>저장된 grid 불러오기</h3>
        <button class="close" id="load-close" type="button">&times;</button>
      </div>
      <div class="load-grid" id="load-list"></div>
    </div>
  </div>

  <div class="toast" id="toast">저장됨</div>

<script>
  // ───────── 설정 ─────────
  const SB_BASE = "https://pstpexrnusiwrkcdypjq.supabase.co/storage/v1/object/public/icons/";
  const publicUrl = path => SB_BASE + path;
  const SVGNS = "http://www.w3.org/2000/svg";
  const ROWS = 10, COLS = 10, CELL = 24; // export 시 칸당 단위(icon 콘텐츠 영역과 동일)
  const EXPORT_SCALE = 32; // viewBox(추상 좌표) 는 CELL 기준 그대로, width/height(실제 렌더링 px) 만 이 배율만큼 키움

  // ───────── title/legend 글자 fit 측정 (builder 미리보기 · export 양쪽 공용) ─────────
  // 예전엔 buildGridSvg() 안에서만 fitFontSize 씀 → 화면 미리보기는 CSS 고정 px라 export 결과랑 크기 달랐음.
  // 측정 로직을 여기 하나로 공유해서 미리보기도 export 랑 똑같이 폭/높이 넘치면 축소되게 맞춤.
  const measureHost = document.createElement("div");
  measureHost.style.cssText = "position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;";
  document.body.appendChild(measureHost);
  const measureSvg = document.createElementNS(SVGNS, "svg");
  measureHost.appendChild(measureSvg);
  function measureTextBBox(text, fontSize, weight) {
    measureSvg.innerHTML = "";
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("font-family", "Inter,-apple-system,sans-serif");
    t.setAttribute("font-weight", weight);
    t.setAttribute("font-size", fontSize);
    t.textContent = text;
    measureSvg.appendChild(t);
    return t.getBBox();
  }
  // 폭이 maxWidth 넘으면 그 비율만큼 font-size 줄임. maxHeight 주면 글자 짧아서 폭은 남아도
  // (축소 안 걸려도) 높이가 그거 넘으면 추가로 줄임. (그래도 남는 초과분은 clipPath 가 마저 자름)
  function fitFontSize(text, baseSize, weight, maxWidth, maxHeight) {
    let size = baseSize;
    let bbox = measureTextBBox(text, size, weight);
    if (bbox.width > maxWidth && bbox.width > 0) {
      size = size * (maxWidth / bbox.width);
      bbox = measureTextBBox(text, size, weight);
    }
    if (maxHeight && bbox.height > maxHeight && bbox.height > 0) {
      size = size * (maxHeight / bbox.height);
      bbox = measureTextBBox(text, size, weight);
    }
    return { size, bbox };
  }

  // generated 아이콘 색 없는 원본을 위한 폴백 팔레트 (이미 색이 박힌 generated svg 는 그대로 씀)
  const PAL = { main:"#F5F4EC", point:"#FFD400", back:"#8E8C82", fill:"none" };
  const STYLE_CSS =
    ".arc{fill:" + PAL.fill + ";stroke:" + PAL.main + ";stroke-width:0.75;stroke-linecap:round;stroke-linejoin:round}" +
    ".edge{fill:none;stroke:" + PAL.main + ";stroke-width:0.75;stroke-linecap:round;stroke-linejoin:round}" +
    ".fill{fill:" + PAL.fill + ";stroke:none}" +
    ".dot{fill:" + PAL.main + ";stroke:none}" +
    ".ins{fill:none;stroke:" + PAL.point + ";stroke-width:0.6;stroke-linecap:round;stroke-linejoin:round}" +
    ".ins-dot{fill:" + PAL.point + ";stroke:none}" +
    ".ins-solid{fill:" + PAL.point + "}" +
    ".ins-text{fill:" + PAL.point + ";font-family:'Inter',-apple-system,sans-serif;font-weight:800}";

  function styledSvg(rawText, name, connectorColor) {
    const doc = new DOMParser().parseFromString(rawText, "image/svg+xml");
    const svg = doc.querySelector("svg");
    if (!svg || doc.querySelector("parsererror")) return null;
    svg.setAttribute("xmlns", SVGNS);
    if (!svg.getAttribute("viewBox")) svg.setAttribute("viewBox", "-2 -2 28 28");
    svg.setAttribute("role", "img");
    if (name) svg.setAttribute("aria-label", name);
    if (connectorColor) {
      // connector 파일은 항상 단색으로 구워짐 → stroke/fill 있는 요소 전부 새 색으로 일괄 교체
      svg.querySelectorAll("[stroke]").forEach(el => { if (el.getAttribute("stroke") !== "none") el.setAttribute("stroke", connectorColor); });
      svg.querySelectorAll("[fill]").forEach(el => { if (el.getAttribute("fill") !== "none") el.setAttribute("fill", connectorColor); });
    }
    if (!svg.querySelector("style")) {
      const style = doc.createElementNS(SVGNS, "style");
      style.textContent = STYLE_CSS;
      svg.insertBefore(style, svg.firstChild);
    }
    return new XMLSerializer().serializeToString(svg);
  }

  // ───────── 상태 ─────────
  // grid[r][c] = null | { connector, icon: {name,path,src}|null, title: string, legend: string[] }
  // connector+icon+title 은 자유 조합(1~3개). legend 는 단독 — legend 있으면 나머지 3개 비움, 반대도 마찬가지.
  const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  function ensureCell(r, c) { return grid[r][c] || (grid[r][c] = { connector: null, icon: null, title: "", legend: [] }); }
  function cellIsEmpty(cell) { return !cell || (!cell.connector && !cell.icon && !cell.title && !(cell.legend && cell.legend.length)); }
  function cleanupCell(r, c) { if (cellIsEmpty(grid[r][c])) grid[r][c] = null; }
  // 드래그 복제(ctrl+드래그)용 — 참조로 옮기면 두 칸이 같은 객체를 공유해서 한쪽만 고쳐도 같이 바뀌는 버그 생김
  function cloneCell(cell) {
    if (!cell) return null;
    return {
      connector: cell.connector ? { ...cell.connector } : null,
      icon: cell.icon ? { ...cell.icon } : null,
      title: cell.title || "",
      legend: (cell.legend || []).slice()
    };
  }
  const escapeHtml = s => s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  let generatedItems = []; // [{name, path, src:"generated"}] — supabase svg/generated
  // connector: 로컬 정적 파일(svg/connector/*.svg), supabase 업로드 불필요, 상대경로로 바로 fetch
  const CONNECTOR_ITEMS = [
    "con_line_h", "con_line_v",
    "con_elbow_lt", "con_elbow_tr", "con_elbow_rb", "con_elbow_bl",
    "con_elbow_lt_curve", "con_elbow_tr_curve", "con_elbow_rb_curve", "con_elbow_bl_curve",
    "con_cross", "con_cross_arrow_up", "con_cross_arrow_down", "con_cross_arrow_left", "con_cross_arrow_right",
    "con_t_no_bottom", "con_t_no_left", "con_t_no_top", "con_t_no_right",

    "con_arrow_lr", "con_arrow_rl", "con_arrow_ud", "con_arrow_du",
    "con_arrow_lr_bi", "con_arrow_ud_bi",
    "con_corner_lt_up", "con_corner_lt_left", "con_corner_tr_right", "con_corner_tr_up",
    "con_corner_rb_down", "con_corner_rb_right", "con_corner_bl_left", "con_corner_bl_down",
    "con_sign_plus", "con_sign_minus", "con_sign_times", "con_sign_divide", "con_sign_equals",
    "con_sign_equals_v", "con_sign_not_equal", "con_sign_not_equal_v", "con_sign_approx", "con_sign_approx_v"
  ].map(name => ({ name, path: "svg/connector/" + name + ".svg", src: "connector" }));
  // icon 탭에 generated(supabase) 뿐 아니라 icon_builder 기본 파츠(frame/insert/logo/face, 로컬 정적 파일)도 같이 보여줌.
  // 색 없는 원본이라 styledSvg() 의 PAL 폴백 스타일로 자동 채색됨.
  // tl/tr/bl/br 분면 frame 은 legacy — icon_builder 에서도 이미 뺀 상태라 여기도 안 실음(frm_full_* 만)
  const FRAME_NAMES = [

    "frm_full_bold_gift-box","frm_full_bold_monitor-4-3","frm_full_bold_person","frm_full_bold_photo-frame",
    "frm_full_bold_ratio-10-16","frm_full_bold_ratio-16-10","frm_full_bold_ratio-16-9","frm_full_bold_ratio-9-16",

  ];
  const INSERT_NAMES = [
    "ins_bold_chart_bar","ins_bold_chart_line","ins_bold_chart_pie","ins_bold_chart_stock","ins_bold_hand_like",
    "ins_bold_list_rows","ins_bold_mark_dots","ins_bold_mark_exclaim","ins_bold_mark_info","ins_bold_mark_question",

    "ins_bold_shape_flag","ins_bold_shape_gear","ins_bold_shape_heart","ins_bold_shape_o","ins_bold_shape_people",
    "ins_bold_shape_person","ins_bold_shape_shuriken","ins_bold_shape_waiter","ins_bold_sign_divide",
    "ins_bold_sign_equals","ins_bold_sign_minus","ins_bold_sign_plus","ins_bold_sign_times","ins_bold_text_code",

  const LOGO_NAMES = [

    "logo_onethelab_v1-5","logo_onethelab_v2","logo_onethelab_v2_tight","logo_openai","logo_usb","logo_web","logo_wifi"
  ];
  const FACE_NAMES = ["face_angry","face_laugh","face_love","face_neutral","face_sad","face_smile","face_surprise","face_wink"];
  const LOCAL_ICON_ITEMS = [
    ...FRAME_NAMES.map(name => ({ name, path: "svg/frame/" + name + ".svg", src: "local" })),
    ...INSERT_NAMES.map(name => ({ name, path: "svg/insert/" + name + ".svg", src: "local" })),
    ...LOGO_NAMES.map(name => ({ name, path: "svg/logo/" + name + ".svg", src: "local" })),
    ...FACE_NAMES.map(name => ({ name, path: "svg/face/" + name + ".svg", src: "local" }))
  ];
  const rawCache = new Map(); // "src:path" -> raw svg text
  let activeCell = null; // {r,c} 현재 picker 대상
  let pickerTab = "connector"; // picker 모달에서 현재 보는 탭

  function itemUrl(item) { return (item.src === "connector" || item.src === "local") ? item.path : publicUrl(item.path); }
  async function getRaw(item) {
    const key = item.src + ":" + item.path;
    if (rawCache.has(key)) return rawCache.get(key);
    const res = await fetch(itemUrl(item));
    if (!res.ok) throw new Error(item.path + " → " + res.status);
    const text = await res.text();
    rawCache.set(key, text);
    return text;
  }

  // ───────── 격자 렌더 ─────────
  const cellEls = [];
  let dragSrc = null;   // {r,c} 드래그 시작 칸
  let hoverCell = null; // {r,c} 마우스 올라간 칸 — Delete 키로 그 칸 비우기용
  // 호버시 뜨는 4개 버튼 — 각각 자기 종류 전용 모달만 엶(기존 탭이동 없앰)
  const CELL_BTNS = [
    { kind: "connector", label: "connector" },
    { kind: "icon", label: "icon" },
    { kind: "title", label: "title" },
    { kind: "list", label: "textfield" }
  ];
  function buildGrid() {
    const host = document.getElementById("gridwrap");
    for (let r = 0; r < ROWS; r++) {
      cellEls.push([]);
      for (let c = 0; c < COLS; c++) {
        const el = document.createElement("div");
        el.className = "gcell";
        const content = document.createElement("div");
        content.className = "cell-content";
        content.innerHTML = '<span class="plus">+</span>';
        el.appendChild(content);
        const btns = document.createElement("div");
        btns.className = "cell-btns";
        CELL_BTNS.forEach(b => {
          const bt = document.createElement("button");
          bt.type = "button"; bt.className = "cbtn"; bt.dataset.kind = b.kind; bt.textContent = b.label;
          bt.addEventListener("click", e => { e.stopPropagation(); openPicker(r, c, b.kind); });
          btns.appendChild(bt);
        });
        el.appendChild(btns);
        el.addEventListener("dragstart", e => {
          if (!grid[r][c]) { e.preventDefault(); return; }
          dragSrc = { r, c };
          e.dataTransfer.effectAllowed = "copyMove"; // ctrl 누르면 copy 커서 보이게(실제 분기는 drop 에서 ctrlKey 로 판단)
          e.dataTransfer.setData("text/plain", r + "," + c); // Firefox 는 setData 없으면 drag 자체를 취소함
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => { el.classList.remove("dragging"); dragSrc = null; });
        el.addEventListener("dragover", e => {
          if (!dragSrc) return;
          e.preventDefault(); // drop 허용
          e.dataTransfer.dropEffect = e.ctrlKey ? "copy" : "move";
          el.classList.add("dragover");
        });
        el.addEventListener("dragleave", () => el.classList.remove("dragover"));
        el.addEventListener("mouseenter", () => { hoverCell = { r, c }; });
        el.addEventListener("mouseleave", () => { if (hoverCell && hoverCell.r === r && hoverCell.c === c) hoverCell = null; });
        el.addEventListener("drop", e => {
          e.preventDefault();
          el.classList.remove("dragover");
          if (!dragSrc) return;
          const { r: r1, c: c1 } = dragSrc;
          dragSrc = null;
          if (r1 === r && c1 === c) return;
          if (e.ctrlKey) {
            // ctrl+드래그 = 복제. 원본 칸은 그대로 두고 대상 칸에 복사(참조 아님, cloneCell)
            grid[r][c] = cloneCell(grid[r1][c1]);
          } else {
            const tmp = grid[r][c];
            grid[r][c] = grid[r1][c1];
            grid[r1][c1] = tmp;
            renderCell(r1, c1);
          }
          renderCell(r, c);
          updateArrowState();
        });
        host.appendChild(el);
        cellEls[r].push(el);
      }
    }
  }
  async function renderCell(r, c) {
    scheduleAutosave(); // 칸 내용 바뀔 때마다(호출 지점 다 여기 거침) localStorage 에 draft 기록
    const el = cellEls[r][c];
    const content = el.querySelector(".cell-content");
    const cell = grid[r][c];
    if (cellIsEmpty(cell)) {
      el.className = "gcell";
      el.draggable = false;
      content.innerHTML = '<span class="plus">+</span>';
      return;
    }
    el.className = "gcell filled";
    el.draggable = true;
    // connector/icon/제목/목록 4개 다 자유 조합 가능(배타적 아님) — 겹쳐 그림: connector→icon→목록→제목 순(나중이 위)
    const hasList = cell.legend && cell.legend.length;
    content.innerHTML = '<div class="layer layer-connector"></div><div class="layer layer-icon"></div>' +
      (hasList ? '<div class="layer-list"></div>' : '') +
      (cell.title ? '<div class="layer layer-title"><span class="cell-title-text"></span></div>' : '');
    const lc = content.querySelector(".layer-connector"), li = content.querySelector(".layer-icon");
    const paint = async (item, host) => {
      if (!item) return;
      try {
        const raw = await getRaw(item);
        const markup = styledSvg(raw, item.name, item.src === "connector" ? connectorStyle.color : undefined);
        if (markup) host.innerHTML = markup;
      } catch (e) {
        host.innerHTML = '<span class="plus" title="load fail">×</span>';
      }
    };
    await Promise.all([paint(cell.connector, lc), paint(cell.icon, li)]);
    // export(buildGridSvg)랑 똑같이 CELL(24) 기준 abstract 단위로 fitFontSize 계산한 뒤,
    // 이 칸의 실제 렌더링 px 폭 비율(pxPerUnit)만큼 곱해서 화면 font-size 로 씀 — 그래야 칸 크기가
    // 반응형으로 바뀌어도, 그리고 style 슬라이더로 키운 크기도 export 결과랑 같은 비율로 보임.
    const pxPerUnit = el.getBoundingClientRect().width / CELL;
    if (hasList) {
      const ll = content.querySelector(".layer-list");
      ll.style.color = legendStyle.color;
      ll.style.background = rgbaFromHex(legendBgStyle.color, legendBgStyle.opacity);
      ll.innerHTML = cell.legend.map(line => '<div class="cell-list-line">' + escapeHtml(line) + '</div>').join("");
      ll.querySelectorAll(".cell-list-line").forEach((div, i) => {
        const fit = fitFontSize(cell.legend[i], legendStyle.size, "400", CELL - 2);
        div.style.fontSize = (fit.size * pxPerUnit) + "px";
      });
    }
    if (cell.title) {
      const tt = content.querySelector(".cell-title-text");
      tt.textContent = cell.title;
      tt.style.color = titleStyle.color;
      tt.style.background = rgbaFromHex(titleBgStyle.color, titleBgStyle.opacity);
      const fit = fitFontSize(cell.title, titleStyle.size, "700", CELL - 2, CELL / 3);
      tt.style.fontSize = (fit.size * pxPerUnit) + "px";
    }
  }
  function clearAllCells() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { grid[r][c] = null; renderCell(r, c); }
    updateArrowState();
  }

  // ───────── 십자키: 그리드 전체 이동 ─────────
  function usedBounds() {
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity, any = false;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c]) {
      any = true;
      if (r < minR) minR = r; if (r > maxR) maxR = r;
      if (c < minC) minC = c; if (c > maxC) maxC = c;
    }
    return any ? { minR, maxR, minC, maxC } : null;
  }
  function updateArrowState() {
    const b = usedBounds();
    const set = (id, enabled) => { document.getElementById(id).disabled = !enabled; };
    if (!b) { ["arrow-up", "arrow-down", "arrow-left", "arrow-right"].forEach(id => set(id, false)); return; }
    set("arrow-up", b.minR > 0);
    set("arrow-down", b.maxR < ROWS - 1);
    set("arrow-left", b.minC > 0);
    set("arrow-right", b.maxC < COLS - 1);
  }
  function shiftGrid(dr, dc) {
    const b = usedBounds();
    if (!b) return;
    if (dr < 0 && b.minR <= 0) return;
    if (dr > 0 && b.maxR >= ROWS - 1) return;
    if (dc < 0 && b.minC <= 0) return;
    if (dc > 0 && b.maxC >= COLS - 1) return;
    const moved = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c]) moved[r + dr][c + dc] = grid[r][c];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) { grid[r][c] = moved[r][c]; renderCell(r, c); }
    updateArrowState();
  }
  document.getElementById("arrow-up").addEventListener("click", () => shiftGrid(-1, 0));
  document.getElementById("arrow-down").addEventListener("click", () => shiftGrid(1, 0));
  document.getElementById("arrow-left").addEventListener("click", () => shiftGrid(0, -1));
  document.getElementById("arrow-right").addEventListener("click", () => shiftGrid(0, 1));

  // ───────── svg 선택 모달 (connector 하위 / icon 상위 / 제목 / 목록 4탭) ─────────
  // connector+icon+title 은 자유 조합. legend(textfield)는 단독 — 서로 선택시 반대편을 비움.
  // 호버 버튼 4개가 각자 해당 종류 모달만 바로 여는 구조라 모달 안 탭이동 없음(칸당 버튼이 곧 종류 선택).
  const CLEAR_LABEL = { connector: "connector 비우기", icon: "icon 비우기", title: "title 비우기", list: "textfield 비우기" };
  const KIND_LABEL = { connector: "connector", icon: "icon", title: "title", list: "textfield" };
  // icon 탭 = generated(supabase, 완성 아이콘) + frame/insert/logo/face(로컬, icon_builder 기본 파츠) 합침
  function pickerSourceItems() { return pickerTab === "connector" ? CONNECTOR_ITEMS : generatedItems.concat(LOCAL_ICON_ITEMS); }
  function openPicker(r, c, kind) {
    activeCell = { r, c };
    document.getElementById("picker-title").textContent = "칸 (" + (r + 1) + "," + (c + 1) + ") · " + KIND_LABEL[kind];
    document.getElementById("picker-search").value = "";
    switchPickerTab(kind);
    document.getElementById("picker-bg").classList.add("show");
  }
  function closePicker() { document.getElementById("picker-bg").classList.remove("show"); activeCell = null; }
  function switchPickerTab(tab) {
    pickerTab = tab;
    document.getElementById("picker-clear").textContent = CLEAR_LABEL[tab];
    const isGraphic = tab === "connector" || tab === "icon";
    document.getElementById("picker-search").hidden = !isGraphic;
    document.getElementById("picker-list").hidden = !isGraphic;
    document.getElementById("picker-text-title").hidden = tab !== "title";
    document.getElementById("picker-text-list").hidden = tab !== "list";
    if (isGraphic) renderPickerList(document.getElementById("picker-search").value.trim().toLowerCase());
    if (tab === "title" && activeCell) {
      const cell = grid[activeCell.r][activeCell.c];
      document.getElementById("picker-title-input").value = cell ? cell.title || "" : "";
      applyMetaStyles();
    }
    if (tab === "list" && activeCell) {
      const cell = grid[activeCell.r][activeCell.c];
      document.getElementById("picker-legend-textarea").value = cell ? (cell.legend || []).join("\n") : "";
      applyMetaStyles();
    }
  }
  function renderPickerList(q) {
    const host = document.getElementById("picker-list");
    host.innerHTML = "";
    const items = pickerSourceItems();
    const filtered = q ? items.filter(it => it.name.toLowerCase().includes(q)) : items;
    if (!filtered.length) {
      host.innerHTML = pickerTab === "connector"
        ? '<div class="empty-msg">connector 항목 없음.</div>'
        : '<div class="empty-msg">generated 아이콘이 없음. SVG Gallery 에서 먼저 업로드하세요.</div>';
      return;
    }
    filtered.forEach(it => {
      const el = document.createElement("div");
      el.className = "pitem";
      const vb = it.src === "connector" ? "0 0 24 24" : "-2 -2 28 28";
      el.innerHTML = '<svg viewBox="' + vb + '"></svg><div class="nm">' + it.name + "</div>";
      host.appendChild(el);
      getRaw(it).then(raw => {
        const markup = styledSvg(raw, it.name, it.src === "connector" ? connectorStyle.color : undefined);
        if (markup) el.querySelector("svg").outerHTML = markup;
      }).catch(() => {});
      el.addEventListener("click", () => {
        if (!activeCell) return;
        const { r, c } = activeCell;
        const cell = ensureCell(r, c);
        const item = { name: it.name, path: it.path, src: it.src };
        if (pickerTab === "connector") cell.connector = item; else cell.icon = item;
        renderCell(r, c);
        updateArrowState();
        closePicker(); // connector/icon 은 고르는 즉시 닫음(title/textfield 는 타이핑 계속해야 하니 열어둠)
      });
    });
  }
  document.getElementById("picker-search").addEventListener("input", e =>
    renderPickerList(e.target.value.trim().toLowerCase()));
  document.getElementById("picker-title-input").addEventListener("input", e => {
    if (!activeCell) return;
    const { r, c } = activeCell;
    const cell = ensureCell(r, c);
    cell.title = e.target.value;
    cleanupCell(r, c);
    renderCell(r, c);
    updateArrowState();
  });
  document.getElementById("picker-legend-textarea").addEventListener("input", e => {
    if (!activeCell) return;
    const { r, c } = activeCell;
    const cell = ensureCell(r, c);
    cell.legend = e.target.value.split("\n").map(l => l.trim()).filter(l => l.length);
    cleanupCell(r, c);
    renderCell(r, c);
    updateArrowState();
  });
  document.getElementById("picker-clear").addEventListener("click", () => {
    if (!activeCell) return;
    const { r, c } = activeCell;
    const cell = grid[r][c];
    if (!cell) return;
    if (pickerTab === "connector") cell.connector = null;
    else if (pickerTab === "icon") cell.icon = null;
    else if (pickerTab === "title") { cell.title = ""; document.getElementById("picker-title-input").value = ""; }
    else { cell.legend = []; document.getElementById("picker-legend-textarea").value = ""; }
    cleanupCell(r, c);
    renderCell(r, c);
    updateArrowState();
  });
  document.getElementById("picker-done").addEventListener("click", closePicker);
  document.getElementById("picker-close").addEventListener("click", closePicker);
  document.getElementById("picker-bg").addEventListener("click", e => { if (e.target.id === "picker-bg") closePicker(); });

  // ───────── 초기 로드: generated 목록 ─────────
  async function loadGenerated() {
    const sb = window.SB_CLIENT;
    if (!sb) { showBanner("Supabase 미설정: HTML 상단 <code>SUPABASE_ANON_KEY</code> 를 채우세요."); return; }
    try {
      const { data, error } = await sb.storage.from("icons").list("svg/generated", {
        limit: 1000, sortBy: { column: "created_at", order: "desc" }
      });
      if (error) throw error;
      generatedItems = (data || []).filter(f => f.name && /\.svg$/i.test(f.name))
        .map(f => ({ name: f.name.replace(/\.svg$/i, ""), path: "svg/generated/" + f.name, src: "generated" }));
      if (!generatedItems.length) showBanner("generated 아이콘이 없음. SVG Gallery/Icon Builder 에서 먼저 아이콘을 올리세요.");
    } catch (e) {
      showBanner("generated 목록을 못 읽음: <code>" + (e.message || e) + "</code>");
    }
  }

  // ───────── export: bounding box 크롭, 내부 상대위치 유지 ─────────
  function usedCells() {
    const used = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c]) used.push({ r, c, ...grid[r][c] });
    return used;
  }
  const SHAPE_SEL = "path,circle,line,rect,polygon,polyline,ellipse,text,tspan";
  const isNoneColor = v => !v || v === "none" || v === "rgba(0, 0, 0, 0)";
  // srcSvg(라이브, 문서에 붙어 computed style 계산 가능) 의 색을 presentation 속성으로 박아 destSvg 자식으로 이동
  function flattenInto(srcSvg, destSvg) {
    const clone = srcSvg.cloneNode(true);
    const srcShapes = srcSvg.querySelectorAll(SHAPE_SEL);
    const cloneShapes = clone.querySelectorAll(SHAPE_SEL);
    cloneShapes.forEach((el, i) => {
      const cs = getComputedStyle(srcShapes[i]);
      el.setAttribute("fill", isNoneColor(cs.fill) ? "none" : cs.fill);
      if (isNoneColor(cs.stroke)) {
        el.setAttribute("stroke", "none");
      } else {
        el.setAttribute("stroke", cs.stroke);
        const m = cs.strokeWidth.match(/(-?[\d.]+)px/);
        el.setAttribute("stroke-width", m ? m[1] : cs.strokeWidth);
        el.setAttribute("stroke-linecap", cs.strokeLinecap || "round");
        el.setAttribute("stroke-linejoin", cs.strokeLinejoin || "round");
      }
      const tag = el.tagName.toLowerCase();
      if (tag === "text" || tag === "tspan") {
        el.setAttribute("font-family", cs.fontFamily);
        el.setAttribute("font-weight", cs.fontWeight);
        if (!el.getAttribute("font-size")) el.setAttribute("font-size", cs.fontSize);
      }
      el.removeAttribute("class"); el.removeAttribute("style");
    });
    clone.querySelectorAll("[class]").forEach(el => el.removeAttribute("class"));
    clone.querySelectorAll("style").forEach(el => el.remove());
    while (clone.firstChild) destSvg.appendChild(clone.firstChild);
  }
  // ───────── 텍스트 스타일 (제목/목록, 전역 공유, localStorage 유지) ─────────
  // 칸마다 title/legend "내용"은 각자 다름(칸별 payload 로 개별 저장). 여기 스타일(색·크기)만 전역 1세트씩.
  const TITLE_STYLE_KEY = "svg-grid-title-style";
  const LEGEND_STYLE_KEY = "svg-grid-legend-style";
  const CONNECTOR_COLOR_KEY = "svg-grid-connector-color";
  const TITLE_BG_KEY = "svg-grid-title-bg";
  const LEGEND_BG_KEY = "svg-grid-legend-bg";
  function loadStyle(key, def) {
    try { const v = JSON.parse(localStorage.getItem(key)); if (v && v.color && v.size) return v; } catch (e) {}
    return { ...def };
  }
  function saveStyle(key, style) { try { localStorage.setItem(key, JSON.stringify(style)); } catch (e) {} }
  function loadColor(key, def) {
    try { const v = localStorage.getItem(key); if (v) return v; } catch (e) {}
    return def;
  }
  function saveColor(key, color) { try { localStorage.setItem(key, color); } catch (e) {} }
  function loadBgStyle(key, def) {
    try { const v = JSON.parse(localStorage.getItem(key)); if (v && v.color && typeof v.opacity === "number") return v; } catch (e) {}
    return { ...def };
  }
  function rgbaFromHex(hex, a) {
    const h = (hex || "#000000").replace("#", "");
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }
  let titleStyle = loadStyle(TITLE_STYLE_KEY, { color: "#F5F4EC", size: 8 });
  let legendStyle = loadStyle(LEGEND_STYLE_KEY, { color: "#F5F4EC", size: 5 });
  // 제목/텍스트필드 뒤 배경판(색+불투명도) — 그림 위에 얹힐 때 글자 구분용. textfield 는 기본 불투명도 0(배경 없음)
  let titleBgStyle = loadBgStyle(TITLE_BG_KEY, { color: "#121210", opacity: 0.55 });
  let legendBgStyle = loadBgStyle(LEGEND_BG_KEY, { color: "#121210", opacity: 0 });
  // connector(배선) 색은 각각 따로 안 바꾸고 한번에 전역으로만 바꿈 — 모든 connector 파일이 원래 단색(#F5F4EC)
  // 이라 styledSvg() 가 stroke/fill 있는 요소를 통째로 이 색으로 덮어씀
  let connectorStyle = { color: loadColor(CONNECTOR_COLOR_KEY, "#F5F4EC") };
  function applyMetaStyles() {
    const ti = document.getElementById("picker-title-input"), le = document.getElementById("picker-legend-textarea");
    if (ti) { ti.style.color = titleStyle.color; ti.style.fontSize = titleStyle.size + "px"; }
    if (le) { le.style.color = legendStyle.color; le.style.fontSize = legendStyle.size + "px"; }
  }

  async function buildGridSvg() {
    const used = usedCells();
    if (!used.length) return null;
    const minR = Math.min(...used.map(u => u.r)), maxR = Math.max(...used.map(u => u.r));
    const minC = Math.min(...used.map(u => u.c)), maxC = Math.max(...used.map(u => u.c));
    const outRows = maxR - minR + 1, outCols = maxC - minC + 1;
    const gridW = outCols * CELL, gridH = outRows * CELL;

    const outer = document.createElementNS(SVGNS, "svg");
    outer.setAttribute("xmlns", SVGNS);
    outer.setAttribute("viewBox", "0 0 " + gridW + " " + gridH);
    // width/height 는 viewBox(추상 좌표) 와 별개 — 실제 렌더링 해상도. EXPORT_SCALE 안 곱하면
    // 3칸짜리 grid 가 72x24px 짜리로 나가서 잔글씨(제목/목록)가 다 뭉개짐.
    outer.setAttribute("width", gridW * EXPORT_SCALE);
    outer.setAttribute("height", gridH * EXPORT_SCALE);

    // 제목/목록 텍스트가 칸 폭보다 커지면 옆칸까지 삐져나가던 문제 → 칸 크기(24x24) 클립 + 폭 초과시 글자 자동 축소
    const defs = document.createElementNS(SVGNS, "defs");
    const clip = document.createElementNS(SVGNS, "clipPath");
    clip.setAttribute("id", "cellClip");
    const clipRect = document.createElementNS(SVGNS, "rect");
    clipRect.setAttribute("x", 0); clipRect.setAttribute("y", 0);
    clipRect.setAttribute("width", CELL); clipRect.setAttribute("height", CELL);
    clip.appendChild(clipRect);
    defs.appendChild(clip);
    outer.appendChild(defs);

    // 색 계산용 숨김 호스트 (문서에 붙어야 getComputedStyle 정상 동작)
    const host = document.createElement("div");
    host.style.cssText = "position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;";
    document.body.appendChild(host);
    // measureTextBBox/fitFontSize 는 파일 상단(모듈 스코프)에서 공용으로 씀 — renderCell 미리보기도 같이 씀
    const missing = []; // svg gallery 에서 나중에 삭제된 아이콘/connector — export 전체를 막지 않고 그 칸만 건너뜀
    try {
      for (const u of used) {
        const cellX = (u.c - minC) * CELL, cellY = (u.r - minR) * CELL;
        // connector(0 0 24 24, 경계까지 꽉 참) 와 icon(-2 -2 28 28, 자체 여백) 은 좌표계가 달라서
        // 같은 nested <svg> 를 공유할 수 없음 → 같은 x/y 위치에 각자 viewBox 로 따로 얹음(connector 먼저, icon 나중=위).
        for (const item of [u.connector, u.icon]) {
          if (!item) continue;
          let raw;
          try { raw = await getRaw(item); }
          catch (e) { missing.push(item.name || item.path); continue; }
          const markup = styledSvg(raw, item.name, item.src === "connector" ? connectorStyle.color : undefined);
          if (!markup) continue;
          host.innerHTML = markup;
          const live = host.querySelector("svg");
          if (!live) continue;
          const nested = document.createElementNS(SVGNS, "svg");
          nested.setAttribute("x", cellX);
          nested.setAttribute("y", cellY);
          nested.setAttribute("width", CELL);
          nested.setAttribute("height", CELL);
          nested.setAttribute("viewBox", live.getAttribute("viewBox") || "-2 -2 28 28");
          flattenInto(live, nested);
          outer.appendChild(nested);
          host.innerHTML = "";
        }
        if (u.legend && u.legend.length) {
          // 목록: connector/icon 위에 겹쳐 그림(배타적 아님). 칸 밖으로 안 나가게 클립 + 폭 초과시 축소
          const g = document.createElementNS(SVGNS, "g");
          g.setAttribute("transform", "translate(" + cellX + "," + cellY + ")");
          g.setAttribute("clip-path", "url(#cellClip)");
          if (legendBgStyle.opacity > 0) {
            const bgRect = document.createElementNS(SVGNS, "rect");
            bgRect.setAttribute("x", 0); bgRect.setAttribute("y", 0);
            bgRect.setAttribute("width", CELL); bgRect.setAttribute("height", CELL);
            bgRect.setAttribute("fill", rgbaFromHex(legendBgStyle.color, legendBgStyle.opacity));
            g.appendChild(bgRect);
          }
          const lh = legendStyle.size * 1.15;
          let ty = Math.max(lh, (CELL - u.legend.length * lh) / 2 + lh * 0.8);
          u.legend.forEach(line => {
            const fit = fitFontSize(line, legendStyle.size, "400", CELL - 2);
            const t = document.createElementNS(SVGNS, "text");
            t.setAttribute("x", CELL / 2); t.setAttribute("y", ty);
            t.setAttribute("text-anchor", "middle");
            t.setAttribute("font-family", "Inter,-apple-system,sans-serif");
            t.setAttribute("font-size", fit.size);
            t.setAttribute("fill", legendStyle.color);
            t.textContent = line;
            g.appendChild(t);
            ty += lh;
          });
          outer.appendChild(g);
        }
        if (u.title) {
          // 아이콘/connector 가 칸을 거의 꽉 채우므로 제목 글자 뒤에 배경판을 깔아야 겹쳐도 구분됨.
          // 칸 밖으로 안 나가게 클립 + 폭 초과시 자동 축소(그래도 남으면 clipPath 가 마저 자름)
          const localX = CELL / 2, localY = CELL - 1.5;
          const fit = fitFontSize(u.title, titleStyle.size, "700", CELL - 2, CELL / 3);
          const padX = fit.size * 0.22, padY = fit.size * 0.14;
          const g = document.createElementNS(SVGNS, "g");
          g.setAttribute("transform", "translate(" + cellX + "," + cellY + ")");
          g.setAttribute("clip-path", "url(#cellClip)");
          const rect = document.createElementNS(SVGNS, "rect");
          rect.setAttribute("x", localX - fit.bbox.width / 2 - padX);
          rect.setAttribute("y", localY + fit.bbox.y - padY);
          rect.setAttribute("width", fit.bbox.width + padX * 2);
          rect.setAttribute("height", fit.bbox.height + padY * 2);
          rect.setAttribute("rx", Math.min(2, fit.size * 0.15));
          rect.setAttribute("fill", rgbaFromHex(titleBgStyle.color, titleBgStyle.opacity));
          g.appendChild(rect);
          const t = document.createElementNS(SVGNS, "text");
          t.setAttribute("x", localX); t.setAttribute("y", localY);
          t.setAttribute("text-anchor", "middle");
          t.setAttribute("font-family", "Inter,-apple-system,sans-serif");
          t.setAttribute("font-weight", "700");
          t.setAttribute("font-size", fit.size);
          t.setAttribute("fill", titleStyle.color);
          t.textContent = u.title;
          g.appendChild(t);
          outer.appendChild(g);
        }
      }
    } finally {
      document.body.removeChild(host);
    }
    if (missing.length) toast("일부 칸 못 불러옴(gallery 에서 삭제됨?): " + missing.join(", "));
    return '<?xml version="1.0" encoding="UTF-8"?>\n' + new XMLSerializer().serializeToString(outer);
  }

  // ───────── 이름/파일명 helper ─────────
  // Supabase Storage 서버가 key 검증할 때 \w(ASCII 문자/숫자)만 허용함 — 한글 그대로 넣으면
  // 업로드 즉시 "Invalid key" 로 거부됨. 그래서 파일명(key)에 쓰기 전 한글을 로마자로 변환.
  const HANGUL_BASE = 0xAC00;
  const HANGUL_CHO = ["g", "kk", "n", "d", "tt", "r", "m", "b", "pp", "s", "ss", "", "j", "jj", "ch", "k", "t", "p", "h"];
  const HANGUL_JUNG = ["a", "ae", "ya", "yae", "eo", "e", "yeo", "ye", "o", "wa", "wae", "oe", "yo", "u", "wo", "we", "wi", "yu", "eu", "ui", "i"];
  const HANGUL_JONG = ["", "g", "kk", "gs", "n", "nj", "nh", "d", "l", "lg", "lm", "lb", "ls", "lt", "lp", "lh", "m", "b", "bs", "s", "ss", "ng", "j", "ch", "k", "t", "p", "h"];
  function hangulToRoman(s) {
    return s.replace(/[가-힣]/g, ch => {
      const code = ch.charCodeAt(0) - HANGUL_BASE;
      const cho = Math.floor(code / (21 * 28));
      const jung = Math.floor((code % (21 * 28)) / 28);
      const jong = code % 28;
      return HANGUL_CHO[cho] + HANGUL_JUNG[jung] + HANGUL_JONG[jong];
    });
  }
  const sanitize = s => hangulToRoman((s || "").toLowerCase()).replace(/\.json$|\.svg$/i, "")
    .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "grid";
  const stamp = () => { const d = new Date(), p = n => String(n).padStart(2, "0");
    return d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
           "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()); };
  // icon builder 의 exportFilename() 처럼(파츠 선택 내용으로 파일명 자동생성, 타이핑 안 시킴) —
  // grid 이름도 칸 내용에서 자동으로 뽑음. 우선순위: 제목 있는 칸 → 사용된 icon/connector 이름 → 그래도 없으면 타임스탬프.
  // 내용 기반으로 고정 이름을 뽑아야 재저장할 때 같은 파일을 계속 덮어씀(매번 새 이름이면 덮어쓰기 개념이 깨짐).
  function autoGridName() {
    const used = usedCells();
    const titled = used.find(u => u.title && u.title.trim());
    if (titled) return sanitize(titled.title);
    const names = [];
    used.forEach(u => { if (u.icon && u.icon.name && !names.includes(u.icon.name)) names.push(u.icon.name); });
    if (!names.length) used.forEach(u => { if (u.connector && u.connector.name && !names.includes(u.connector.name)) names.push(u.connector.name); });
    if (names.length) return sanitize(names.slice(0, 2).join("-"));
    return "grid-" + stamp();
  }
  // 이름칸은 읽기전용(자동생성 표시용) — 비어있을 때만 새로 채움, 있으면 그대로 재사용(같은 grid 계속 덮어쓰기 유지)
  function ensureGridName() {
    const input = document.getElementById("grid-name");
    if (!input.value.trim()) input.value = autoGridName();
    return input.value.trim();
  }

  // ───────── 저장 (json 정의 + SVG Gallery 썸네일 동시 갱신) ─────────
  // "저장"과 "갤러리 업로드"는 사용자 입장에서 같은 행동(이 grid 를 보관한다) 이라 버튼 하나로 합침.
  // 갤러리 svg 는 저장할 때마다 새 이름(타임스탬프 포함)으로 올림 — 이름 고정+upsert 방식은 CDN/브라우저가
  // 예전 바이트를 계속 캐시해줘서(cacheControl 헤더 무시하는 경우까지) 안 지워짐. URL 자체를 바꿔 캐시를 원천 회피.
  // 실제 "현재 svg" 위치는 json 정의의 svgPath 필드가 가리킴(이름만으로 경로 추측 불가해짐).
  function gallerySvgPath(name) { return "svg/grid/" + sanitize(name) + "_" + stamp() + ".svg"; }
  function gridJsonFilename(name) { return sanitize(name) + ".json"; }
  async function gridFileExists(filename) {
    const { data, error } = await SB.storage.from("icons").list("grid", { search: filename });
    if (error) return false;
    return (data || []).some(f => f.name === filename);
  }
  function buildGridPayload() {
    const strip = item => item ? { path: item.path, name: item.name } : null;
    return {
      rows: ROWS, cols: COLS,
      cells: usedCells().map(u => ({
        r: u.r, c: u.c, connector: strip(u.connector), icon: strip(u.icon),
        title: u.title || "", legend: u.legend || []
      }))
    };
  }

  // ───────── 자동저장 (localStorage, 새로고침해도 마지막 작업 grid 복원) ─────────
  const AUTOSAVE_KEY = "gridBuilderAutosaveV1";
  let autosaveTimer = null;
  function scheduleAutosave() {
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(() => {
      try {
        const payload = buildGridPayload();
        payload.name = document.getElementById("grid-name").value || "";
        localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(payload));
      } catch (e) {}
    }, 400);
  }
  function restoreAutosave() {
    let data;
    try { data = JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || "null"); } catch (e) { return; }
    if (!data || !(data.cells || []).length) return;
    data.cells.forEach(cell => {
      if (cell.r >= 0 && cell.r < ROWS && cell.c >= 0 && cell.c < COLS) {
        const connector = cell.connector ? { ...cell.connector, src: "connector" } : null;
        const icon = cell.icon ? { ...cell.icon, src: "generated" } : null;
        const title = cell.title || "";
        const legend = cell.legend || [];
        if (connector || icon || title || legend.length) {
          grid[cell.r][cell.c] = { connector, icon, title, legend };
          renderCell(cell.r, cell.c);
        }
      }
    });
    updateArrowState();
    if (data.name) document.getElementById("grid-name").value = data.name;
    toast("마지막 작업 자동복원됨");
  }
  // 실제 업로드(json 정의 + 갤러리 svg). 존재확인/덮어쓰기 확인은 호출부(saveGrid/saveGridAs)에서 끝내고 옴.
  // svg는 항상 새 이름으로 올림(캐시 회피) → json.svgPath 로 가리키게 한 뒤, 성공하면 oldSvgPath 있을 때만 지움.
  // 순서 고정: 새 svg 업로드 → json(포인터) 갱신 → 구 svg 삭제. 역순으로 하면 중간에 링크 깨지는 순간이 생김.
  async function uploadGrid(btn, name, oldSvgPath) {
    btn.disabled = true; const orig = btn.textContent; btn.textContent = "저장 중…";
    try {
      const xml = await buildGridSvg();
      if (!xml) { toast("빈 grid 는 저장 못함"); return; }
      const svgPath = gallerySvgPath(name);
      const svgBlob = new Blob([xml], { type: "image/svg+xml" });
      const { error: svgErr } = await SB.storage.from("icons")
        .upload(svgPath, svgBlob, { contentType: "image/svg+xml", upsert: true });
      if (svgErr) { toast("저장 실패(svg): " + svgErr.message); return; }

      const payload = buildGridPayload();
      payload.svgPath = svgPath;
      const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
      const path = "grid/" + gridJsonFilename(name);
      // cacheControl 안 주면 supabase 기본 3600초(1시간) 로 CDN 엣지에 캐시됨 — 같은 경로에 upsert 로
      // 덮어써도 엣지가 예전 바이트 계속 줄 수 있어서(브라우저 강제새로고침으론 못 지움) "0" 으로 짧게 잡음.
      const { error } = await SB.storage.from("icons").upload(path, blob, { contentType: "application/json", upsert: true, cacheControl: "0" });
      if (error) { toast("저장됨(svg만) → " + svgPath + " · 정의 갱신 실패: " + error.message); return; }

      if (oldSvgPath && oldSvgPath !== svgPath) {
        SB.storage.from("icons").remove([oldSvgPath]).catch(() => {}); // 실패해도 저장 자체는 성공 처리(고아 svg 하나 남는 정도)
      }
      document.getElementById("grid-name").value = name;
      toast("저장됨 → " + path + " · 갤러리 → " + svgPath);
    } finally {
      btn.disabled = !galCanEdit; btn.textContent = orig;
    }
  }

  // "저장": 이름칸 그대로 씀 — 같은 이름 파일 있으면 덮어쓸지 확인, 취소하면 아무것도 안 함.
  // 덮어쓰는 경우 기존 json 을 먼저 읽어 지금 가리키는 svgPath(=곧 교체될 구 svg)를 알아둠.
  async function saveGrid() {
    if (!galCanEdit) { toast("저장 권한 없음"); return; }
    if (!usedCells().length) { toast("빈 grid 는 저장 못함"); return; }
    const name = ensureGridName();
    const filename = gridJsonFilename(name);
    let oldSvgPath = null;
    if (await gridFileExists(filename)) {
      if (!confirm("'" + filename + "' 이미 있음. 덮어쓸까요?")) { toast("저장 취소"); return; }
      try {
        const res = await fetch(publicUrl("grid/" + filename));
        if (res.ok) oldSvgPath = (await res.json()).svgPath || null;
      } catch (e) {}
    }
    await uploadGrid(document.getElementById("btn-save"), name, oldSvgPath);
  }

  // "새 파일로 저장": 현재 이름칸 값과 무관하게 내용 기준으로 새 이름을 뽑음. 구 svg 안 지움(별개 항목으로 남김).
  // 같은 이름 파일이 이미 있으면(내용 안 바뀌어 원래 파일과 이름 겹치는 경우 포함) 타임스탬프 붙여
  // 무조건 새 파일로 만듦 — 확인창 없이 바로 "새 파일" 의도를 보장.
  async function saveGridAs() {
    if (!galCanEdit) { toast("저장 권한 없음"); return; }
    if (!usedCells().length) { toast("빈 grid 는 저장 못함"); return; }
    let name = autoGridName();
    if (await gridFileExists(gridJsonFilename(name))) name = name + "-" + stamp();
    await uploadGrid(document.getElementById("btn-save-as"), name, null);
  }

  // ───────── 불러오기 (json 목록) ─────────
  async function openLoadModal() {
    const host = document.getElementById("load-list");
    host.innerHTML = '<div class="empty-msg">목록 불러오는 중…</div>';
    document.getElementById("load-bg").classList.add("show");
    if (!SB) { host.innerHTML = '<div class="empty-msg">supabase 미설정</div>'; return; }
    try {
      const { data, error } = await SB.storage.from("icons").list("grid", {
        limit: 1000, sortBy: { column: "created_at", order: "desc" }
      });
      if (error) throw error;
      const files = (data || []).filter(f => f.name && /\.json$/i.test(f.name));
      host.innerHTML = "";
      if (!files.length) { host.innerHTML = '<div class="empty-msg">저장된 grid 없음</div>'; return; }
      files.forEach(f => {
        const label = f.name.replace(/\.json$/i, "");
        const card = document.createElement("div");
        card.className = "load-card";
        // svg 는 저장할 때마다 새 이름이라 경로를 이름만으로 못 뽑음 — json 을 읽어 svgPath 포인터로 채움
        card.innerHTML =
          '<div class="load-thumb"><img alt="" onerror="this.style.display=\'none\'"></div>' +
          '<div class="load-nm">' + label + '</div>' +
          '<div class="load-btns">' +
            '<button type="button" class="btn primary load">불러오기</button>' +
            '<button type="button" class="btn del">삭제</button>' +
          '</div>';
        card.querySelector(".load").addEventListener("click", () => loadGridFile("grid/" + f.name, label));
        card.querySelector(".del").addEventListener("click", () => deleteGridFile("grid/" + f.name, label));
        host.appendChild(card);
        fetch(publicUrl("grid/" + f.name)).then(r => r.ok ? r.json() : null).then(data => {
          if (data && data.svgPath) card.querySelector(".load-thumb img").src = publicUrl(data.svgPath);
        }).catch(() => {});
      });
    } catch (e) {
      host.innerHTML = '<div class="empty-msg">목록을 못 읽음: ' + (e.message || e) + '</div>';
    }
  }
  async function loadGridFile(path, label) {
    try {
      const res = await fetch(publicUrl(path));
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      clearAllCells();
      (data.cells || []).forEach(cell => {
        if (cell.r >= 0 && cell.r < ROWS && cell.c >= 0 && cell.c < COLS) {
          const connector = cell.connector ? { ...cell.connector, src: "connector" } : null;
          const icon = cell.icon ? { ...cell.icon, src: "generated" } : null;
          const title = cell.title || "";
          const legend = cell.legend || [];
          if (connector || icon || title || legend.length) {
            grid[cell.r][cell.c] = { connector, icon, title, legend };
            renderCell(cell.r, cell.c);
          }
        }
      });
      updateArrowState();
      document.getElementById("grid-name").value = label;
      document.getElementById("load-bg").classList.remove("show");
      toast("불러옴 → " + label);
    } catch (e) { toast("불러오기 실패: " + (e.message || e)); }
  }
  async function deleteGridFile(path, label) {
    if (!galCanEdit) { toast("삭제 권한 없음"); return; }
    if (!confirm("삭제할까요?\n" + label)) return;
    if (!confirm("진짜로 삭제 하겠습니까?\n되돌릴 수 없습니다.")) return;
    const { error } = await SB.storage.from("icons").remove([path]);
    if (error) { toast("삭제 실패: " + error.message); return; }
    toast("삭제됨");
    openLoadModal();
  }
  document.getElementById("btn-load").addEventListener("click", openLoadModal);
  document.getElementById("load-close").addEventListener("click", () => document.getElementById("load-bg").classList.remove("show"));
  document.getElementById("load-bg").addEventListener("click", e => { if (e.target.id === "load-bg") document.getElementById("load-bg").classList.remove("show"); });

  // 칸 위에 마우스 올린 채 Delete 키 → 그 칸(connector+icon+title+textfield 전부) 확인 후 비움.
  // input/textarea 포커스 중이거나 모달 열려있으면 그쪽 텍스트 편집이 우선이라 건드리지 않음.
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
      if (document.getElementById("picker-bg").classList.contains("show")) closePicker();
      return;
    }
    if (e.key !== "Delete") return;
    if (!hoverCell) return;
    const tag = document.activeElement && document.activeElement.tagName;
    if (tag === "INPUT" || tag === "TEXTAREA") return;
    if (["picker-bg", "load-bg", "textstyle-bg"].some(id => document.getElementById(id).classList.contains("show"))) return;
    const { r, c } = hoverCell;
    if (cellIsEmpty(grid[r][c])) return;
    if (!confirm("(" + (r + 1) + "," + (c + 1) + ") 칸 내용을 전부 지울까요? (connector/icon/title/textfield)")) return;
    grid[r][c] = null;
    renderCell(r, c);
    updateArrowState();
  });

  // ───────── export: 로컬 다운로드 / gallery 업로드 ─────────
  document.getElementById("btn-new").addEventListener("click", () => {
    if (!confirm("현재 grid 를 비울까요? (저장 안 한 내용은 사라짐)")) return;
    clearAllCells();
    document.getElementById("grid-name").value = "";
  });
  document.getElementById("btn-save").addEventListener("click", saveGrid);
  document.getElementById("btn-save-as").addEventListener("click", saveGridAs);
  document.getElementById("btn-download").addEventListener("click", async () => {
    const xml = await buildGridSvg();
    if (!xml) { toast("빈 grid 는 export 못함"); return; }
    const url = URL.createObjectURL(new Blob([xml], { type: "image/svg+xml" }));
    const a = document.createElement("a");
    a.href = url;
    a.download = sanitize(ensureGridName()) + "_" + stamp() + ".svg";
    a.click();
    URL.revokeObjectURL(url);
  });
  // ───────── 토스트 / 배너 ─────────
  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
  }
  function showBanner(html) {
    const b = document.getElementById("banner"); b.className = "banner show"; b.innerHTML = html;
  }

  // ───────── 인증 (로그인 + editors 편집권한) ─────────
  const SB = window.SB_CLIENT;
  let galCanEdit = false;
  async function galUser() { if (!SB) return null; const { data } = await SB.auth.getUser(); return (data && data.user) || null; }
  async function galPerm() { try { const { data } = await SB.rpc("can_edit_generated"); return data === true; } catch (e) { return false; } }
  async function refreshGalAuth() {
    const st = document.getElementById("auth-status"), bt = document.getElementById("auth-btn");
    if (!SB) { st.textContent = "supabase 미설정 (ANON KEY 필요)"; bt.disabled = true; return; }
    const u = await galUser();
    if (u) {
      bt.textContent = "로그아웃";
      galCanEdit = await galPerm();
      st.textContent = (u.email || "로그인됨") + (galCanEdit ? " · 편집 가능" : " · 권한 없음");
    } else { bt.textContent = "로그인"; galCanEdit = false; st.textContent = "로그인 필요"; }
    document.body.classList.toggle("edit-on", galCanEdit);
    document.getElementById("btn-save").disabled = !galCanEdit;
    document.getElementById("btn-save-as").disabled = !galCanEdit;
  }
  document.getElementById("auth-btn").addEventListener("click", async () => {
    if (!SB) return;
    if (await galUser()) { await SB.auth.signOut(); refreshGalAuth(); }
    else await SB.auth.signInWithOAuth({ provider: "google", options: { redirectTo: location.href.split("#")[0] } });
  });
  if (SB) SB.auth.onAuthStateChange(() => refreshGalAuth());

  // ───────── 스타일 패널 (connector/제목/목록, 전역, localStorage) ─────────
  function openTextStylePanel() {
    document.getElementById("style-connector-color").value = connectorStyle.color;
    document.getElementById("style-title-color").value = titleStyle.color;
    document.getElementById("style-title-size").value = titleStyle.size;
    document.getElementById("style-title-size-v").textContent = titleStyle.size + "px";
    document.getElementById("style-title-bg-color").value = titleBgStyle.color;
    document.getElementById("style-title-bg-opacity").value = titleBgStyle.opacity;
    document.getElementById("style-title-bg-opacity-v").textContent = titleBgStyle.opacity.toFixed(2);
    document.getElementById("style-legend-color").value = legendStyle.color;
    document.getElementById("style-legend-size").value = legendStyle.size;
    document.getElementById("style-legend-size-v").textContent = legendStyle.size + "px";
    document.getElementById("style-legend-bg-color").value = legendBgStyle.color;
    document.getElementById("style-legend-bg-opacity").value = legendBgStyle.opacity;
    document.getElementById("style-legend-bg-opacity-v").textContent = legendBgStyle.opacity.toFixed(2);
    document.getElementById("textstyle-bg").classList.add("show");
  }
  function closeTextStylePanel() { document.getElementById("textstyle-bg").classList.remove("show"); }
  document.getElementById("btn-textstyle").addEventListener("click", openTextStylePanel);
  document.getElementById("textstyle-close").addEventListener("click", closeTextStylePanel);
  document.getElementById("textstyle-bg").addEventListener("click", e => { if (e.target.id === "textstyle-bg") closeTextStylePanel(); });
  // 이미 그려진 칸 중 제목/목록 가진 것만 다시 그려 새 색상 즉시 반영 (연결/아이콘만 있는 칸은 그대로)
  function refreshTextStyledCells() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell && (cell.title || (cell.legend && cell.legend.length))) renderCell(r, c);
    }
  }
  // title/legend font-size 는 칸의 실제 렌더링 px 폭(pxPerUnit) 기준이라, 창 크기 바뀌어 칸 px 폭이
  // 달라지면 다시 그려야 export 랑 맞는 비율 유지됨.
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(refreshTextStyledCells, 150);
  });
  // connector 가진 칸만 다시 그려 새 색상 즉시 반영
  function refreshConnectorCells() {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell && cell.connector) renderCell(r, c);
    }
  }
  document.getElementById("style-connector-color").addEventListener("input", e => {
    connectorStyle.color = e.target.value; saveColor(CONNECTOR_COLOR_KEY, connectorStyle.color); refreshConnectorCells();
  });
  document.getElementById("style-title-color").addEventListener("input", e => {
    titleStyle.color = e.target.value; applyMetaStyles(); saveStyle(TITLE_STYLE_KEY, titleStyle); refreshTextStyledCells();
  });
  document.getElementById("style-title-size").addEventListener("input", e => {
    titleStyle.size = parseInt(e.target.value, 10);
    document.getElementById("style-title-size-v").textContent = titleStyle.size + "px";
    applyMetaStyles(); saveStyle(TITLE_STYLE_KEY, titleStyle); refreshTextStyledCells();
  });
  document.getElementById("style-legend-color").addEventListener("input", e => {
    legendStyle.color = e.target.value; applyMetaStyles(); saveStyle(LEGEND_STYLE_KEY, legendStyle); refreshTextStyledCells();
  });
  document.getElementById("style-legend-size").addEventListener("input", e => {
    legendStyle.size = parseInt(e.target.value, 10);
    document.getElementById("style-legend-size-v").textContent = legendStyle.size + "px";
    applyMetaStyles(); saveStyle(LEGEND_STYLE_KEY, legendStyle); refreshTextStyledCells();
  });
  function saveBgStyle(key, style) { try { localStorage.setItem(key, JSON.stringify(style)); } catch (e) {} }
  document.getElementById("style-title-bg-color").addEventListener("input", e => {
    titleBgStyle.color = e.target.value; saveBgStyle(TITLE_BG_KEY, titleBgStyle); refreshTextStyledCells();
  });
  document.getElementById("style-title-bg-opacity").addEventListener("input", e => {
    titleBgStyle.opacity = parseFloat(e.target.value);
    document.getElementById("style-title-bg-opacity-v").textContent = titleBgStyle.opacity.toFixed(2);
    saveBgStyle(TITLE_BG_KEY, titleBgStyle); refreshTextStyledCells();
  });
  document.getElementById("style-legend-bg-color").addEventListener("input", e => {
    legendBgStyle.color = e.target.value; saveBgStyle(LEGEND_BG_KEY, legendBgStyle); refreshTextStyledCells();
  });
  document.getElementById("style-legend-bg-opacity").addEventListener("input", e => {
    legendBgStyle.opacity = parseFloat(e.target.value);
    document.getElementById("style-legend-bg-opacity-v").textContent = legendBgStyle.opacity.toFixed(2);
    saveBgStyle(LEGEND_BG_KEY, legendBgStyle); refreshTextStyledCells();
  });

  // ───────── 초기화 ─────────
  buildGrid();
  restoreAutosave();
  updateArrowState();
  loadGenerated();
  refreshGalAuth();
  applyMetaStyles();
</script>

<!-- 부모 iframe 높이 보고 -->
<script>
(function(){
  function contentHeight(){
    var b=document.body, max=0, k=b.children;
    for(var i=0;i<k.length;i++){
      var r=k[i].getBoundingClientRect();
      if(r.bottom>max) max=r.bottom;
    }
    var pb=parseFloat(getComputedStyle(b).paddingBottom)||0;
    return Math.ceil(max + pb + window.scrollY);
  }
  var locked=0, raf=null;
  function report(){
    var h=contentHeight();
    if(h>locked){ locked=h; document.body.style.minHeight=locked+"px"; }
    if(locked){ try{ parent.postMessage({type:'iconFrameHeight',height:locked},'*'); }catch(e){} }
  }
  function schedule(){ if(raf) cancelAnimationFrame(raf); raf=requestAnimationFrame(report); }
  function relock(){ locked=0; document.body.style.minHeight=""; schedule(); }
  window.addEventListener('load', schedule);
  window.addEventListener('resize', relock);
  [0,100,300,600,1200,2000].forEach(function(t){ setTimeout(schedule,t); });
})();
</script>
</body>
